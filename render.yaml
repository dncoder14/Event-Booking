services:
  - type: web
    name: event-booking-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false                  # Paste your Neon connection string in Render dashboard
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure secret
      - key: FRONTEND_URL
        sync: false                  # Set to your Vercel URL after frontend deploy
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /
    autoDeploy: true
