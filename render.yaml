services:
  - type: web
    name: event-booking-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: event-booking-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure secret
      - key: FRONTEND_URL
        sync: false                  # Set manually in Render dashboard (your Vercel URL)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false                  # Set manually in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false                  # Set manually in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false                  # Set manually in Render dashboard
    healthCheckPath: /
    autoDeploy: true

databases:
  - name: event-booking-db
    databaseName: eventbooking
    user: eventbooking_user
    plan: free
